name: rpiformer_lolv2_synthetic
model_type: ImageCleanModel
scale: 1
num_gpu: 1
manual_seed: 100
use_amp: true

datasets:
  train:
    name: LOLv2SyntheticTrain
    type: Dataset_PairedImage
    dataroot_gt: data/LOLv2/Synthetic/Train/Normal
    dataroot_lq: data/LOLv2/Synthetic/Train/Low
    geometric_augs: true
    filename_tmpl: "{}"
    io_backend:
      type: disk
    use_shuffle: true
    num_worker_per_gpu: 8
    batch_size_per_gpu: 8
    mini_batch_sizes: [8]
    iters: [65000]
    gt_size: 256
    gt_sizes: [256]
    dataset_enlarge_ratio: 1
    prefetch_mode: ~

  val:
    name: LOLv2SyntheticVal
    type: Dataset_PairedImage
    dataroot_gt: data/LOLv2/Synthetic/Test/Normal
    dataroot_lq: data/LOLv2/Synthetic/Test/Low
    io_backend:
      type: disk

network_g:
  type: RPIFormer
  in_channels: 3
  out_channels: 3
  n_feat: 40
  stage: 1
  num_blocks: [1, 2, 2]
  lca_encoder_layers: []
  lca_decoder_layers: []
  use_lca_bottleneck: true
  downsample_lca: false
  lca_gate_init: 0.10
  lca_gate_scale: 0.10
  euler_cfg:
    enable_encoder_gate: true
    enable_decoder_gate: true
    encoder_init_alpha: 0.06
    decoder_init_alpha: 0.01
    max_gate_alpha: 0.3

path:
  pretrain_network_g: pretrained_weights/euler/best_model_LOL_v2_synthetic.pth
  strict_load_g: false
  resume_state: ~

train:
  total_iter: 65000
  warmup_iter: -1
  use_grad_clip: true
  scheduler:
    type: CosineAnnealingRestartCyclicLR
    periods: [32500, 32500]
    restart_weights: [1, 1]
    eta_mins: [0.00005, 0.00001]
  mixing_augs:
    mixup: true
    mixup_beta: 1.2
    use_identity: true
  optim_g:
    type: Adam
    lr: !!float 1e-4
    betas: [0.9, 0.999]
  pixel_opt:
    type: L1Loss
    loss_weight: 1
    reduction: mean

val:
  window_size: 4
  val_freq: 1000
  save_img: false
  rgb2bgr: true
  use_image: false
  max_minibatch: 8
  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 0
      test_y_channel: false

logger:
  print_freq: 500
  save_checkpoint_freq: 2000
  use_tb_logger: false

dist_params:
  backend: nccl
  port: 29500
