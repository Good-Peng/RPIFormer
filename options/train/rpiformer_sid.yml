name: rpiformer_sid
model_type: ImageCleanModel
scale: 1
num_gpu: 1
manual_seed: 100
use_amp: true

datasets:
  train:
    name: SIDTrain
    type: Dataset_SIDImage
    dataroot_gt: data/SID/long_sid2
    dataroot_lq: data/SID/short_sid2
    io_backend:
      type: disk
    cache_data: true
    N_frames: 5
    train_size: [960, 512]
    use_flip: true
    use_rot: true
    use_shuffle: true
    num_worker_per_gpu: 4
    batch_size_per_gpu: 1
    mini_batch_sizes: [1]
    iters: [150000]
    gt_size: 256
    gt_sizes: [256]
    dataset_enlarge_ratio: 1
    prefetch_mode: ~

  val:
    name: SIDVal
    type: Dataset_SIDImage
    dataroot_gt: data/SID/long_sid2
    dataroot_lq: data/SID/short_sid2
    io_backend:
      type: disk
    cache_data: true
    N_frames: 5
    train_size: [960, 512]
    use_flip: false
    use_rot: false

network_g:
  type: RPIFormer
  in_channels: 3
  out_channels: 3
  n_feat: 40
  stage: 1
  num_blocks: [1, 2, 2]
  lca_encoder_layers: [1]
  lca_decoder_layers: [0]
  use_lca_bottleneck: true
  downsample_lca: true
  lca_gate_init: 0.08
  lca_gate_scale: 0.10
  euler_cfg:
    enable_encoder_gate: true
    enable_decoder_gate: true
    encoder_init_alpha: 0.06
    decoder_init_alpha: 0.01
    max_gate_alpha: 0.2

path:
  pretrain_network_g: pretrained_weights/euler/best_model_SID.pth
  strict_load_g: false
  resume_state: ~

train:
  total_iter: 150000
  warmup_iter: 2000
  use_grad_clip: true
  scheduler:
    type: CosineAnnealingRestartCyclicLR
    periods: [60000, 90000]
    restart_weights: [1, 0.5]
    eta_mins: [5e-05, 1e-06]
  mixing_augs:
    mixup: false
    mixup_beta: 1.2
    use_identity: true
  optim_g:
    type: Adam
    lr: !!float 1e-4
    betas: [0.9, 0.999]
  pixel_opt:
    type: L1Loss
    loss_weight: 1
    reduction: mean

val:
  window_size: 4
  val_freq: 2000
  save_img: false
  rgb2bgr: true
  use_image: false
  max_minibatch: 1
  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 0
      test_y_channel: false

logger:
  print_freq: 500
  save_checkpoint_freq: 2000
  use_tb_logger: false

dist_params:
  backend: nccl
  port: 29500
